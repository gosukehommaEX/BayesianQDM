url: https://gosukehommaEX.github.io/BayesianQDM/
template:
  bootstrap: 5

reference:
- title: Decision Probability Functions
  desc: Go/NoGo/Gray decision probability calculation
  contents:
  - pbayesdecisionprob1bin
  - pbayesdecisionprob1cont
  - pbayesdecisionprob2bin
  - pbayesdecisionprob2cont

- title: Posterior and Predictive Probability Functions
  desc: Posterior and posterior predictive probability calculation
  contents:
  - pbayespostpred1bin
  - pbayespostpred1cont
  - pbayespostpred2bin
  - pbayespostpred2cont

- title: Distribution Functions for Continuous Endpoints
  desc: CDF for the difference of two t-distributions
  contents:
  - ptdiff_NI
  - ptdiff_MC
  - ptdiff_MM

- title: Distribution Functions for Binary Endpoints
  desc: CDF and related functions for Beta and Beta-binomial distributions
  contents:
  - pbetadiff
  - pbetabinomdiff

- title: Sampling Functions
  desc: Random samplers for multivariate distributions
  contents:
  - rnsbt
  - rdirichlet

- title: Utility Functions
  desc: Supporting functions for joint probability and multinomial enumeration
  contents:
  - getjointbin
  - allmultinom

