url: https://gosukehommaEX.github.io/BayesianQDM/
template:
  bootstrap: 5

home:
  title: BayesianQDM
  description: >
    Bayesian Quantitative Decision-Making Framework for Binary and Continuous Endpoints.
  logo: man/figures/logo.png

reference:
- title: Decision Probability Functions
  desc: Go/NoGo/Gray decision probability calculation
  contents:
  - pbayesdecisionprob1bin
  - pbayesdecisionprob1cont
  - pbayesdecisionprob2bin
  - pbayesdecisionprob2cont

- title: Print Methods
  desc: S3 print methods for decision probability objects
  contents:
  - print.pbayesdecisionprob1bin
  - print.pbayesdecisionprob1cont
  - print.pbayesdecisionprob2bin
  - print.pbayesdecisionprob2cont

- title: Plot Methods
  desc: S3 plot methods for decision probability objects
  contents:
  - plot.pbayesdecisionprob1bin
  - plot.pbayesdecisionprob1cont
  - plot.pbayesdecisionprob2bin
  - plot.pbayesdecisionprob2cont

- title: Posterior and Predictive Probability Functions
  desc: Posterior and posterior predictive probability calculation
  contents:
  - pbayespostpred1bin
  - pbayespostpred1cont
  - pbayespostpred2bin
  - pbayespostpred2cont

- title: Optimal Threshold Search Functions
  desc: Grid-search functions for optimal Go/NoGo thresholds
  contents:
  - getgamma1bin
  - getgamma1cont
  - getgamma2bin
  - getgamma2cont

- title: Distribution Functions for Continuous Endpoints
  desc: CDF for the difference of two t-distributions
  contents:
  - ptdiff_NI
  - ptdiff_MC
  - ptdiff_MM

- title: Distribution Functions for Binary Endpoints
  desc: CDF and related functions for Beta and Beta-binomial distributions
  contents:
  - pbetadiff
  - pbetabinomdiff

- title: Sampling Functions
  desc: Random samplers for multivariate distributions
  contents:
  - rdirichlet

- title: Utility Functions
  desc: Supporting functions for joint probability and multinomial enumeration
  contents:
  - getjointbin
  - allmultinom

